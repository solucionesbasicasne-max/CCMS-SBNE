<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMMS Enterprise — Full System</title>
<style>
  /* ESTILOS INTEGRADOS PARA EVITAR FALLOS DE RUTA */
  :root {
    --bg: #1c2228; --surface: #262c33; --surface2: #343d46;
    --primary: #0070f2; --text: #f0f2f5; --text-dim: #a0aab4;
    --border: #3d444b; --red: #ff4d4d; --green: #48bb78; --yellow: #f6ad55;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
  
  /* SHELL */
  .shell-bar { height: 48px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top: 0; width: 100%; z-index: 1000; }
  .logo { font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .logo-main { color: var(--primary); }
  .shell-right { display: flex; align-items: center; gap: 20px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
  
  /* LAYOUT */
  .app-layout { display: flex; padding-top: 48px; height: 100vh; }
  .side-nav { width: 240px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 20px 10px; flex-shrink: 0; }
  .main-content { flex-grow: 1; overflow-y: auto; background: var(--bg); padding: 20px; }
  
  /* MENU */
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; color: var(--text-dim); text-decoration: none; border-radius: 6px; font-size: 13px; margin-bottom: 4px; cursor: pointer; transition: .2s; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--primary); color: #fff; font-weight: 600; }
  .nav-group-hdr { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin: 20px 0 10px 12px; letter-spacing: 1px; }

  /* DASHBOARD */
  .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
  .kpi-card { background: var(--surface); padding: 20px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
  .kpi-val { font-size: 28px; font-weight: 700; margin: 10px 0; }
  .kpi-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }

  /* UI COMPONENTS */
  .btn { padding: 8px 16px; border-radius: 4px; font-size: 13px; border: none; cursor: pointer; font-weight: 600; transition: .2s; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  
  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 2000; }
  .modal { background: var(--surface); width: 100%; max-width: 500px; border-radius: 8px; border: 1px solid var(--border); padding: 25px; }
  .form-field { margin-bottom: 15px; }
  .form-label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
  .form-input { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); color: #fff; border-radius: 4px; }

  /* UTILS */
  .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .no-access { padding: 50px; text-align: center; color: var(--text-dim); }
</style>
</head>
<body>

<div id="auth-root"></div>

<script>
  // ── CONFIGURACIÓN SUPABASE ─────────────────────
  const SUPABASE_URL = 'https://xwciwrtenrdvhwvvjkzt.supabase.co/rest/v1/';
  const SUPABASE_KEY = 'sb_publishable_RIfaIPuzvQ27Drwp-vx-MQ_o6_xgoGt';

  const State = {
    user: JSON.parse(localStorage.getItem('cmms_user')) || null,
    currentModule: 'dashboard',
    permissions: { canDelete: false, allowedViews: [] }
  };

  // ── MOTOR DE NAVEGACIÓN ────────────────────────
  function init() {
    console.log("Iniciando motor...");
    if (!State.user) {
      renderLogin();
    } else {
      applyPermissions();
      renderShell();
      navigate('dashboard');
    }
  }

  function applyPermissions() {
    const r = State.user.role;
    if (r === 'Super Admin' || r === 'admin') {
      State.permissions = { canDelete: true, allowedViews: ['*'] };
    } else if (r === 'Supervisor') {
      State.permissions = { canDelete: false, allowedViews: ['dashboard','activos','manto','inventarios'] };
    } else {
      State.permissions = { canDelete: false, allowedViews: ['dashboard','manto','calendario'] };
    }
  }

  function renderLogin() {
    document.getElementById('auth-root').innerHTML = `
      <div style="height:100vh; display:flex; align-items:center; justify-content:center">
        <div class="modal" style="display:block">
          <h2 style="text-align:center; margin-bottom:30px">CMMS ENTERPRISE</h2>
          <div class="form-field">
            <label class="form-label">Usuario</label>
            <input type="text" id="login-user" class="form-input" placeholder="admin / tecnico">
          </div>
          <button class="btn btn-primary" style="width:100%; margin-top:10px" onclick="login()">ENTRAR</button>
        </div>
      </div>`;
  }

  function login() {
    const u = document.getElementById('login-user').value.toLowerCase();
    if (u === 'admin') State.user = { id: 1, nombre: 'Admin', role: 'admin' };
    else if (u === 'tecnico') State.user = { id: 2, nombre: 'Técnico', role: 'tecnico' };
    else return alert('Usuario no válido (admin / tecnico)');
    
    localStorage.setItem('cmms_user', JSON.stringify(State.user));
    location.reload();
  }

  function logout() {
    localStorage.removeItem('cmms_user');
    location.reload();
  }

  function renderShell() {
    document.getElementById('auth-root').innerHTML = `
      <header class="shell-bar">
        <div class="logo" onclick="navigate('dashboard')">
          <span class="logo-main">CCMS</span> SBNE
        </div>
        <div class="shell-right">
          <div style="display:flex; align-items:center; gap:8px; font-size:11px">
            <div class="status-dot" style="background:var(--green)"></div>
            CONECTADO
          </div>
          <button class="btn btn-ghost" onclick="logout()">SALIR</button>
        </div>
      </header>
      <div class="app-layout">
        <nav class="side-nav">
          <div class="nav-group-hdr">MENÚ PRINCIPAL</div>
          <a class="nav-item" id="nav-dashboard" onclick="navigate('dashboard')">📊 Dashboard</a>
          <a class="nav-item" id="nav-manto" onclick="navigate('manto')">📋 Mantenimiento</a>
          <a class="nav-item" id="nav-activos" onclick="navigate('activos')">🏭 Activos</a>
          <a class="nav-item" id="nav-inventario" onclick="navigate('inventarios')">📦 Inventarios</a>
          <div class="nav-group-hdr">SISTEMA</div>
          <a class="nav-item" onclick="navigate('usuarios')">👤 Usuarios</a>
          <a class="nav-item" onclick="navigate('negocio')">🏢 Mi Negocio</a>
        </nav>
        <main class="main-content" id="main-content">
          <div class="spinner"></div>
        </main>
      </div>`;
  }

  async function navigate(module) {
    // Check permissions
    if (State.permissions.allowedViews[0] !== '*' && !State.permissions.allowedViews.includes(module)) {
      if (module !== 'dashboard') {
        document.getElementById('main-content').innerHTML = '<div class="no-access">⛔ No tienes permiso para ver este módulo</div>';
        return;
      }
    }

    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    const activeNav = document.getElementById('nav-' + module);
    if (activeNav) activeNav.classList.add('active');

    if (module === 'dashboard') renderDashboard();
    else renderModule(module);
  }

  function renderDashboard() {
    document.getElementById('main-content').innerHTML = `
      <h1>Resumen General</h1>
      <div class="dashboard-grid" style="margin-top:20px">
        <div class="kpi-card"><div class="kpi-label">OT Pendientes</div><div class="kpi-val" style="color:var(--primary)">0</div></div>
        <div class="kpi-card"><div class="kpi-label">En Proceso</div><div class="kpi-val" style="color:var(--yellow)">0</div></div>
        <div class="kpi-card"><div class="kpi-label">Completadas</div><div class="kpi-val" style="color:var(--green)">0</div></div>
        <div class="kpi-card"><div class="kpi-label">Fallas</div><div class="kpi-val" style="color:var(--red)">0</div></div>
      </div>
      <div style="background:var(--surface); padding:30px; border-radius:8px; border:1px solid var(--border); text-align:center">
        <h3>¡Bienvenido de nuevo, ${State.user.nombre}!</h3>
        <p style="color:var(--text-dim); margin-top:10px">Selecciona un módulo en el menú lateral para empezar.</p>
      </div>`;
  }

  function renderModule(name) {
    document.getElementById('main-content').innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center">
        <h1 style="text-transform:capitalize">${name}</h1>
        <button class="btn btn-primary">+ Nuevo Registro</button>
      </div>
      <div style="margin-top:20px; background:var(--surface); padding:40px; border-radius:8px; border:1px solid var(--border); text-align:center">
        <div style="font-size:40px; margin-bottom:15px">📂</div>
        <p style="color:var(--text-dim)">Cargando datos de ${name} desde Supabase...</p>
        <div class="spinner"></div>
      </div>`;
  }

  window.onload = init;
</script>
</body>
</html>
