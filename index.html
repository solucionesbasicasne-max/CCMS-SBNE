<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMMS Enterprise — Full System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  /* ── CSS FULL SYSTEM ────────────────────────────────── */
  :root {
    --bg: #1c2228; --surface: #262c33; --surface2: #343d46;
    --primary: #0070f2; --text: #f0f2f5; --text-dim: #a0aab4;
    --border: #3d444b; --red: #ff4d4d; --green: #107e3e; --yellow: #e9730c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
  
  /* SHELL */
  .shell-bar { height: 48px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top: 0; width: 100%; z-index: 1000; }
  .logo { font-weight: 700; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 18px; }
  .logo span { color: var(--primary); }
  .shell-right { display: flex; align-items: center; gap: 15px; }
  
  /* LAYOUT */
  .app-layout { display: flex; padding-top: 48px; height: 100vh; }
  .side-nav { width: 250px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 20px 10px; flex-shrink: 0; }
  .main-content { flex-grow: 1; overflow-y: auto; padding: 25px; position: relative; background: var(--bg); }

  /* NAV */
  .nav-group-hdr { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin: 22px 0 8px 12px; letter-spacing: 1px; font-weight: 600; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; color: var(--text-dim); text-decoration: none; border-radius: 6px; font-size: 13px; cursor: pointer; margin-bottom: 2px; transition: .2s; }
  .nav-item:hover { background: var(--surface2); color: #fff; }
  .nav-item.active { background: var(--primary); color: #fff; font-weight: 600; box-shadow: 0 4px 10px rgba(0,112,242,0.3); }

  /* GRID */
  .grid-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-top: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--surface2); padding: 14px 12px; text-align: left; color: var(--text-dim); border-bottom: 1px solid var(--border); font-weight: 600; }
  td { padding: 12px; border-bottom: 1px solid var(--border); color: var(--text); }
  tr:hover { background: rgba(255,255,255,0.03); }

  /* UI COMPONENTS */
  .btn { padding: 8px 16px; border-radius: 4px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; transition: .2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-icon { padding: 6px; border-radius: 4px; }
  
  .badge { padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-green { background: rgba(16,126,62,0.15); color: #48bb78; border: 1px solid rgba(16,126,62,0.3); }
  .badge-blue { background: rgba(0,112,242,0.15); color: #4dabff; border: 1px solid rgba(0,112,242,0.3); }
  .badge-yellow { background: rgba(233,115,12,0.15); color: #f6ad55; border: 1px solid rgba(233,115,12,0.3); }
  .badge-red { background: rgba(255,77,77,0.15); color: #ff6b6b; border: 1px solid rgba(255,77,77,0.3); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(4px); }
  .modal { background: var(--surface); width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; border-radius: 10px; border: 1px solid var(--border); padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); position: relative; }
  .modal-close { position: absolute; top: 15px; right: 15px; color: var(--text-dim); cursor: pointer; font-size: 20px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
  .form-field { margin-bottom: 15px; }
  .form-label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }
  .form-input { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); color: #fff; border-radius: 6px; font-size: 13px; }
  
  .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.05); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 60px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="root"></div>

<script>
  // ── CONFIGURACIÓN & SCHEMA COMPLETO (SEGÚN DIAGRAMA) ──
  const CONFIG = {
    url: 'https://xwciwrtenrdvhwvvjkzt.supabase.co/rest/v1/',
    key: 'sb_publishable_RIfaIPuzvQ27Drwp-vx-MQ_o6_xgoGt'
  };

  const SCHEMA = {
    sitios: { label: "Plantas / Sitios", group: "Jerarquía", icon: "🏗", fields: [
      {key: "id", pk: true, hidden: true},
      {key: "codigo", label: "Código Sitio", required: true},
      {key: "nombre", label: "Nombre Sitio", required: true},
      {key: "rfc", label: "RFC / ID Fiscal"},
      {key: "pais", label: "País"},
      {key: "ciudad", label: "Ciudad"},
      {key: "direccion", label: "Dirección"},
      {key: "contacto", label: "Persona Contacto"},
      {key: "telefono", label: "Teléfono"},
      {key: "email", label: "Email"},
      {key: "estado", label: "Estado", type: "select", options: ["Activo","Inactivo"]}
    ]},
    ubicaciones: { label: "Ubicaciones", group: "Jerarquía", icon: "📍", fields: [
      {key: "id", pk: true, hidden: true},
      {key: "codigo", label: "Código Ubicación"},
      {key: "nombre", label: "Nombre Ubicación"},
      {key: "descripcion", label: "Descripción"},
      {key: "planta", label: "Planta / Nave"},
      {key: "area", label: "Área / Sector"},
      {key: "padre_id", label: "Ubicación Padre ID"}
    ]},
    activos_principales: { label: "Activos Principales", group: "Jerarquía", icon: "🏭", fields: [
      {key: "id", pk: true, hidden: true},
      {key: "codigo", label: "Tag / Código"},
      {key: "nombre", label: "Nombre Activo"},
      {key: "descripcion", label: "Descripción Técnica"},
      {key: "marca", label: "Marca"},
      {key: "modelo", label: "Modelo"},
      {key: "numero_serie", label: "Nº Serie"},
      {key: "fecha_fabricacion", label: "F. Fabricación", type: "date"},
      {key: "fecha_instalacion", label: "F. Instalación", type: "date"},
      {key: "criticidad", label: "Criticidad", type: "select", options: ["A - Crítica", "B - Importante", "C - Soporte"]},
      {key: "estado", label: "Estado", type: "select", options: ["Operativo","Fuera de servicio","En falla"]}
    ]},
    mps: { label: "Planes MP", group: "Mantenimiento", icon: "📅", fields: [
      {key: "id", pk: true, hidden: true},
      {key: "codigo_mp", label: "Código MP"},
      {key: "nombre_mp", label: "Nombre del Plan"},
      {key: "descripcion", label: "Descripción de Tareas"},
      {key: "frecuencia", label: "Frecuencia (Valor)", type: "number"},
      {key: "unidad_frecuencia", label: "Unidad", type: "select", options: ["Días", "Semanas", "Meses", "Horas"]},
      {key: "tipo_mantenimiento", label: "Tipo", type: "select", options: ["Preventivo", "Predictivo", "Legal"]},
      {key: "tiempo_estimado_horas", label: "Tiempo Est. (Hrs)"},
      {key: "estado", label: "Estado", type: "select", options: ["Activo","Borrador"]}
    ]},
    ordenes_trabajo: { label: "Órdenes de Trabajo", group: "Mantenimiento", icon: "📋", fields: [
      {key: "id", pk: true, hidden: true},
      {key: "numero_ot", label: "Nº Orden", required: true},
      {key: "tipo_ot", label: "Tipo OT", type: "select", options: ["Preventiva", "Correctiva", "Emergencia", "Mejora"]},
      {key: "prioridad", label: "Prioridad", type: "select", options: ["Baja", "Media", "Alta", "Urgente"]},
      {key: "descripcion_falla", label: "Descripción de Falla"},
      {key: "descripcion_trabajo", label: "Trabajo Realizado"},
      {key: "fecha_inicio_programada", label: "Inicio Prog.", type: "date"},
      {key: "fecha_fin_programada", label: "Fin Prog.", type: "date"},
      {key: "fecha_inicio_real", label: "Inicio Real", type: "date"},
      {key: "fecha_fin_real", label: "Fin Real", type: "date"},
      {key: "costo_mano_obra", label: "Costo MO ($)"},
      {key: "costo_materiales", label: "Costo Mat ($)"},
      {key: "costo_total", label: "Costo Total ($)"},
      {key: "causa_raiz", label: "Causa Raíz"},
      {key: "estado", label: "Estado", type: "select", options: ["Pendiente", "Aprobada", "En proceso", "Completada", "Cerrada"]}
    ]},
    personal: { label: "Personal Técnico", group: "Recursos", icon: "👤", fields: [
      {key: "id", pk: true, hidden: true},
      {key: "nombre", label: "Nombre"},
      {key: "apellido", label: "Apellido"},
      {key: "numero_empleado", label: "Nº Empleado"},
      {key: "cargo", label: "Cargo / Puesto"},
      {key: "turno", label: "Turno"},
      {key: "email", label: "Email"},
      {key: "fecha_ingreso", label: "F. Ingreso", type: "date"},
      {key: "estado", label: "Estado", type: "select", options: ["Activo","Inactivo"]}
    ]}
  };

  const State = {
    user: JSON.parse(localStorage.getItem('cmms_user')) || null,
    currentModule: 'dashboard',
    rows: [],
    editingIndex: -1,
    permissions: { canDelete: false, allowedViews: ['*'] }
  };

  // ── MOTOR API ─────────────────────────────────
  async function api(path, method = 'GET', body = null) {
    const url = `${CONFIG.url}${path.toLowerCase()}?select=*`;
    const headers = { 'apikey': CONFIG.key, 'Authorization': `Bearer ${CONFIG.key}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
    const opts = { method, headers };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    if (!res.ok) throw new Error("Error en conexión");
    return res.json();
  }

  // ── INICIO Y NAVEGACIÓN ───────────────────────
  window.onload = () => {
    if (!State.user) return renderLogin();
    renderShell();
    navigate('dashboard');
  };

  function login() {
    const u = document.getElementById('login-user').value.toLowerCase();
    if (u === 'admin') State.user = { nombre: 'Super Admin', role: 'Admin' };
    else State.user = { nombre: 'Técnico', role: 'Técnico' };
    localStorage.setItem('cmms_user', JSON.stringify(State.user));
    location.reload();
  }

  function logout() { localStorage.removeItem('cmms_user'); location.reload(); }

  function navigate(mod) {
    State.currentModule = mod;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.id === 'nav-'+mod));
    if (mod === 'dashboard') renderDashboard();
    else renderModule(mod);
  }

  function renderLogin() {
    document.getElementById('root').innerHTML = `
      <div style="height:100vh; display:flex; align-items:center; justify-content:center; background:#1c2228">
        <div class="modal" style="display:block; width:350px; text-align:center">
          <h2 style="margin-bottom:20px">CMMS ENTERPRISE</h2>
          <input type="text" id="login-user" class="form-input" placeholder="admin / tecnico" onkeypress="if(event.key==='Enter')login()">
          <button class="btn btn-primary" style="width:100%; margin-top:20px" onclick="login()">ENTRAR</button>
        </div>
      </div>`;
  }

  function renderShell() {
    document.getElementById('root').innerHTML = `
      <header class="shell-bar">
        <div class="logo" onclick="navigate('dashboard')"><span>CCMS</span> SBNE</div>
        <div class="shell-right">
          <div style="font-size:11px; color:var(--green)">● ONLINE</div>
          <button class="btn btn-ghost" onclick="logout()">SALIR</button>
        </div>
      </header>
      <div class="app-layout">
        <nav class="side-nav">
          <div class="nav-item" id="nav-dashboard" onclick="navigate('dashboard')">📊 Dashboard</div>
          <div class="nav-group-hdr">MANTENIMIENTO</div>
          <div class="nav-item" id="nav-ordenes_trabajo" onclick="navigate('ordenes_trabajo')">📋 Órdenes de Trabajo</div>
          <div class="nav-item" id="nav-mps" onclick="navigate('mps')">📅 Planes de MP</div>
          <div class="nav-group-hdr">JERARQUÍA</div>
          <div class="nav-item" id="nav-activos_principales" onclick="navigate('activos_principales')">🏭 Activos</div>
          <div class="nav-item" id="nav-ubicaciones" onclick="navigate('ubicaciones')">📍 Ubicaciones</div>
          <div class="nav-item" id="nav-sitios" onclick="navigate('sitios')">🏗 Sitios / Plantas</div>
          <div class="nav-group-hdr">RECURSOS</div>
          <div class="nav-item" id="nav-personal" onclick="navigate('personal')">👤 Personal</div>
        </nav>
        <main class="main-content" id="main-content"></main>
      </div>
      <div class="modal-overlay" id="modal-overlay"></div>`;
  }

  async function renderDashboard() {
    document.getElementById('main-content').innerHTML = `<h1>Hola, ${State.user.nombre}</h1><p>Resumen operacional cargando...</p>`;
    try {
      const ots = await api('ordenes_trabajo');
      document.getElementById('main-content').innerHTML = `
        <h1>Dashboard</h1>
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-top:20px">
          <div class="kpi-card"><div>OT Abiertas</div><div class="kpi-val">${ots.filter(o=>o.estado!=='Cerrada').length}</div></div>
          <div class="kpi-card" style="border-left-color:var(--yellow)"><div>En Proceso</div><div class="kpi-val">${ots.filter(o=>o.estado==='En proceso').length}</div></div>
        </div>`;
    } catch(e) {}
  }

  async function renderModule(mod) {
    const sch = SCHEMA[mod];
    document.getElementById('main-content').innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center">
        <h1>${sch.icon} ${sch.label}</h1>
        <button class="btn btn-primary" onclick="openModal('${mod}')">+ Nuevo Registro</button>
      </div>
      <div class="grid-wrap" id="grid-container"><div class="spinner"></div></div>`;
    
    try {
      State.rows = await api(mod);
      const visibleFields = sch.fields.filter(f=>!f.hidden).slice(0, 6);
      let html = `<table><thead><tr><th>#</th>${visibleFields.map(f => `<th>${f.label}</th>`).join('')}<th>ACCIONES</th></tr></thead><tbody>`;
      State.rows.forEach((r, i) => {
        html += `<tr><td>${i+1}</td>${visibleFields.map(f => `<td>${r[f.key] || '—'}</td>`).join('')}
        <td>
          <button class="btn btn-ghost btn-icon" onclick="openModal('${mod}', ${i})">✏</button>
        </td></tr>`;
      });
      html += '</tbody></table>';
      document.getElementById('grid-container').innerHTML = State.rows.length ? html : '<div style="padding:40px; text-align:center">Sin datos</div>';
    } catch (e) {
      document.getElementById('grid-container').innerHTML = '<p>Error de conexión</p>';
    }
  }

  function openModal(mod, index = -1) {
    const sch = SCHEMA[mod];
    State.editingIndex = index;
    const row = index >= 0 ? State.rows[index] : {};
    
    let html = `
      <div class="modal">
        <span class="modal-close" onclick="closeModal()">×</span>
        <h3>${index >= 0 ? 'Editar' : 'Nuevo'} ${sch.label}</h3>
        <div class="form-grid">
          ${sch.fields.filter(f=>!f.pk).map(f => `
            <div class="form-field">
              <label class="form-label">${f.label}</label>
              ${f.type === 'select' ? `
                <select id="f-${f.key}" class="form-input">
                  ${f.options.map(o => `<option value="${o}" ${row[f.key]===o?'selected':''}>${o}</option>`).join('')}
                </select>
              ` : `
                <input type="${f.type||'text'}" id="f-${f.key}" class="form-input" value="${row[f.key]||''}">
              `}
            </div>
          `).join('')}
        </div>
        <div style="text-align:right; margin-top:20px">
          <button class="btn btn-ghost" onclick="closeModal()" style="margin-right:10px">Cancelar</button>
          <button class="btn btn-primary" onclick="saveItem('${mod}')">Guardar Registro</button>
        </div>
      </div>`;
    
    const overlay = document.getElementById('modal-overlay');
    overlay.innerHTML = html;
    overlay.style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

  async function saveItem(mod) {
    const sch = SCHEMA[mod];
    const data = {};
    sch.fields.filter(f=>!f.pk).forEach(f => {
      data[f.key] = document.getElementById('f-' + f.key).value;
    });

    try {
      const isEdit = State.editingIndex >= 0;
      const url = isEdit ? `${CONFIG.url}${mod}?id=eq.${State.rows[State.editingIndex].id}` : `${CONFIG.url}${mod}`;
      const method = isEdit ? 'PATCH' : 'POST';
      
      const res = await fetch(url, {
        method,
        headers: { 'apikey': CONFIG.key, 'Authorization': `Bearer ${CONFIG.key}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
        body: JSON.stringify(data)
      });

      if (res.ok) { closeModal(); navigate(mod); } 
      else { alert("Error al guardar"); }
    } catch(e) { alert("Error"); }
  }

  window.onload = init;
</script>
</body>
</html>
