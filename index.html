<style>
  :root {
    --bg: #11151a; --surface: #1e242a; --surface2: #2b333c;
    --primary: #0066cc; --primary-hover: #0052a3;
    --text: #f0f2f5; --text-dim: #9aa5b1;
    --border: #323b44; --red: #e53e3e; --green: #38a169; --yellow: #dd6b20;
    --glass: rgba(30, 36, 42, 0.85);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
  
  /* SHELL */
  .shell-bar { height: 50px; background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: fixed; top: 0; width: 100%; z-index: 1000; }
  .logo { font-weight: 800; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 18px; letter-spacing: -0.5px; }
  .logo span { color: #3b82f6; }
  .shell-right { display: flex; align-items: center; gap: 15px; }
  
  /* LAYOUT */
  .app-layout { display: flex; padding-top: 50px; height: 100vh; }
  .side-nav { width: 260px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 15px 10px; flex-shrink: 0; transition: width 0.3s; }
  .main-content { flex-grow: 1; overflow-y: auto; padding: 30px; position: relative; background: var(--bg); }

  /* NAV */
  .nav-group-hdr { font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin: 15px 0 5px 0; padding: 10px 15px; letter-spacing: 1px; font-weight: 700; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-radius: 6px; transition: 0.2s; }
  .nav-group-hdr:hover { background: rgba(255,255,255,0.05); color: #fff; }
  .nav-dropdown { overflow: hidden; transition: max-height 0.3s ease-out; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 15px; color: var(--text-dim); text-decoration: none; border-radius: 6px; font-size: 13px; cursor: pointer; margin-bottom: 2px; transition: .2s; font-weight: 500; }
  .nav-item:hover { background: var(--surface2); color: #fff; }
  .nav-item.active { background: rgba(59, 130, 246, 0.15); color: #3b82f6; font-weight: 600; border-left: 3px solid #3b82f6; }
  .nav-item i { font-style: normal; width: 20px; display: inline-block; text-align: center; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* DASHBOARD KPI */
  .dashboard-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
  .kpi-card { background: var(--surface); padding: 25px; border-radius: 12px; border: 1px solid var(--border); position: relative; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
  .kpi-card:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary); }
  .kpi-card.green::before { background: var(--green); }
  .kpi-card.yellow::before { background: var(--yellow); }
  .kpi-card.red::before { background: var(--red); }
  .kpi-title { font-size: 12px; color: var(--text-dim); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
  .kpi-value { font-size: 36px; font-weight: 800; margin-top: 10px; color: #fff; }

  /* GRID */
  .module-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .module-title { font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .grid-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
  th { background: rgba(0,0,0,0.2); padding: 15px; color: var(--text-dim); border-bottom: 1px solid var(--border); font-weight: 600; white-space: nowrap; }
  td { padding: 15px; border-bottom: 1px solid var(--border); color: #fff; vertical-align: middle; }
  tr:hover { background: rgba(255,255,255,0.03); }

  /* UI COMPONENTS */
  .btn { padding: 10px 18px; border-radius: 6px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: .2s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .btn-ghost:hover { border-color: #fff; color: #fff; }
  .btn-danger { background: rgba(229, 62, 62, 0.1); color: #fc8181; border: 1px solid rgba(229, 62, 62, 0.3); }
  .btn-danger:hover { background: #e53e3e; color: #fff; }
  .btn-success { background: rgba(56, 161, 105, 0.1); color: #68d391; border: 1px solid rgba(56, 161, 105, 0.3); }
  .btn-success:hover { background: #38a169; color: #fff; }
  .btn-icon { padding: 8px; border-radius: 6px; }

  .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: inline-block; }
  .badge-green { background: rgba(56,161,105,0.15); color: #68d391; border: 1px solid rgba(56,161,105,0.3); }
  .badge-blue { background: rgba(59,130,246,0.15); color: #90cdf4; border: 1px solid rgba(59,130,246,0.3); }
  .badge-yellow { background: rgba(221,107,32,0.15); color: #fbd38d; border: 1px solid rgba(221,107,32,0.3); }
  .badge-red { background: rgba(229,62,62,0.15); color: #fc8181; border: 1px solid rgba(229,62,62,0.3); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(5px); }
  .modal { background: var(--surface); width: 100%; max-width: 800px; max-height: 90vh; display: flex; flex-direction: column; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative; }
  .modal-header { padding: 20px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-body { padding: 30px; overflow-y: auto; flex-grow: 1; }
  .modal-footer { padding: 20px 30px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 15px; }
  .modal-close { color: var(--text-dim); cursor: pointer; font-size: 24px; line-height: 1; transition: 0.2s; }
  .modal-close:hover { color: #fff; }
  
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .form-field { margin-bottom: 5px; }
  .form-label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-input { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: #fff; border-radius: 8px; font-size: 14px; transition: 0.2s; }
  .form-input:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
  .form-input:disabled { opacity: 0.5; cursor: not-allowed; }

  .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.05); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 60px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

    permissions: { canDelete: false, canEdit: false }
  };

  // ── MOTOR API ─────────────────────────────────
  async function api(path, method = 'GET', body = null) {
    const hasQuery = path.includes('?');
    const url = `${CONFIG.url}${path.toLowerCase()}${hasQuery ? '&select=*' : '?select=*'}`;
    const headers = { 'apikey': CONFIG.key, 'Authorization': `Bearer ${CONFIG.key}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
    const opts = { method, headers };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    if (!res.ok) throw new Error("Error en conexión");
    return res.json();
  }

  // ── INIT & NAV ────────────────────────────────
  window.onload = () => {
    if (!State.user) return renderLogin();
    applyPermissions();
    renderShell();
    navigate('dashboard');
  };

  function applyPermissions() {
    const r = State.user.role;
    State.permissions = {
      canDelete: r === 'Admin',
      canEdit: r === 'Admin' || r === 'Supervisor',
      isTech: r === 'Técnico'
    };
  }

  async function login() {
    const u = document.getElementById('login-user').value.trim();
    if (!u) return alert("Ingrese un usuario");
    
    try {
      // Intentamos buscar el usuario en la tabla 'usuarios'
      const users = await api(`usuarios?username=eq.${u}`);
      if (users && users.length > 0) {
        const user = users[0];
        State.user = { 
          nombre: user.nombre_completo || user.username, 
          role: user.role, 
          username: user.username 
        };
        localStorage.setItem('cmms_user', JSON.stringify(State.user));
        location.reload();
      } else {
        // Fallback para el admin inicial si la tabla está vacía
        if (u.toLowerCase() === 'admin') {
          State.user = { nombre: 'Super Admin', role: 'Admin', username: 'admin' };
          localStorage.setItem('cmms_user', JSON.stringify(State.user));
          location.reload();
        } else {
          alert("Usuario no encontrado en la base de datos.");
        }
      }

      console.error(e);
      alert("Error al validar usuario. Verifique su conexión y configuración de Supabase.");
    }
  }
  function logout() { localStorage.removeItem('cmms_user'); location.reload(); }

    State.currentModule = mod;

  }

  // ── DASHBOARD DINÁMICO ────────────────────────
  async function renderDashboard() {
    document.getElementById('main-content').innerHTML = `<div class="spinner"></div>`;
    try {
      const [ots, activos] = await Promise.all([api('ordenes_trabajo'), api('activos_principales')]);
      
      const otAbiertas = ots.filter(o => o.estado !== 'Cerrada' && o.estado !== 'Completada').length;
      const otProceso = ots.filter(o => o.estado === 'En proceso').length;
      const activosCriticos = activos.filter(a => a.criticidad === 'A - Crítica').length;

      document.getElementById('main-content').innerHTML = `
        <div class="dashboard-header">
          <div><h1 style="font-weight:800; font-size:28px">Centro de Control Operativo</h1><p style="color:var(--text-dim); margin-top:5px">Métricas de mantenimiento en tiempo real</p></div>
        </div>
        <div class="kpi-grid">
          <div class="kpi-card yellow">
            <div class="kpi-title">OT Pendientes</div><div class="kpi-value">${otAbiertas}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-title">OT En Ejecución</div><div class="kpi-value">${otProceso}</div>
          </div>
          <div class="kpi-card green">
            <div class="kpi-title">Eficiencia Mensual</div><div class="kpi-value">94%</div>
          </div>
          <div class="kpi-card red">
            <div class="kpi-title">Activos Críticos</div><div class="kpi-value">${activosCriticos}</div>
          </div>
        </div>
        <div class="grid-wrap" style="padding:20px">
          <h3 style="margin-bottom:15px">Últimas Órdenes Creadas</h3>
          <table>
            <thead><tr><th>Nº OT</th><th>Tipo</th><th>Estado</th></tr></thead>
            <tbody>
              ${ots.slice(0,5).map(o => `<tr onclick="navigate('ordenes_trabajo')" style="cursor:pointer"><td>${o.numero_ot||'—'}</td><td>${o.tipo_ot||'—'}</td><td><span class="badge badge-blue">${o.estado||'—'}</span></td></tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    } catch(e) { document.getElementById('main-content').innerHTML = `Error cargando KPIs.`; }
  }

  // ── RENDER MÓDULOS ────────────────────────────
  async function renderModule(mod) {
    const sch = SCHEMA[mod];
    document.getElementById('main-content').innerHTML = `
      <div class="module-header">
        <div class="module-title">${sch.icon} ${sch.label}</div>
        <button class="btn btn-primary" onclick="openModal('${mod}')">+ Nuevo Registro</button>
      </div>
      <div class="grid-wrap" id="grid-container"><div class="spinner"></div></div>`;
    
    try {
      State.rows = await api(mod);
      // Filtramos campos ocultos en la tabla (como los UUID)
      const tableFields = sch.fields.filter(f => !f.pk && !f.hiddenInTable);
      
      let html = `<table><thead><tr><th>CÓDIGO / REF</th>${tableFields.map(f => `<th>${f.label}</th>`).join('')}<th>ACCIONES</th></tr></thead><tbody>`;
      State.rows.forEach((r, i) => {
        // Encontrar el campo principal (codigo, numero_ot, nombre)
        let mainCol = r.codigo || r.numero_ot || r.username || `Ref-${i}`;
        
        html += `<tr><td style="font-weight:700; color:#3b82f6">${mainCol}</td>${tableFields.map(f => {
          const val = r[f.key] || '—';
          if (val === 'Aprobada' || val === 'Activo' || val === 'Operativo') return `<td><span class="badge badge-green">${val}</span></td>`;
          if (val === 'En proceso') return `<td><span class="badge badge-blue">${val}</span></td>`;
          if (val === 'Pendiente') return `<td><span class="badge badge-yellow">${val}</span></td>`;
          if (val === 'Crítica' || val === 'Fuera de servicio' || val === 'Urgente') return `<td><span class="badge badge-red">${val}</span></td>`;
          return `<td>${val}</td>`;
        }).join('')}
        <td>
          <div style="display:flex; gap:5px">
            <button class="btn btn-ghost btn-icon" onclick="viewModal('${mod}', ${i})" title="Ver Detalles">👁</button>
            <button class="btn btn-ghost btn-icon" onclick="openModal('${mod}', ${i})" title="Editar">✏</button>
            ${mod === 'ordenes_trabajo' ? `
              <button class="btn btn-success btn-icon" onclick="actionOT(${i}, 'start')" title="Iniciar (Play)">▶</button>
              <button class="btn btn-danger btn-icon" onclick="actionOT(${i}, 'stop')" title="Finalizar (Stop)">⏹</button>
              <button class="btn btn-ghost btn-icon" onclick="window.print()" title="Imprimir">🖨</button>
            ` : ''}
            ${State.permissions.canDelete ? `<button class="btn btn-danger btn-icon" onclick="deleteItem('${mod}', ${i})" title="Eliminar">🗑</button>` : ''}
          </div>
        </td></tr>`;
      });
      html += '</tbody></table>';
      document.getElementById('grid-container').innerHTML = State.rows.length ? html : '<div style="padding:60px; text-align:center; color:var(--text-dim)">Sin registros.</div>';
    } catch (e) {
      document.getElementById('grid-container').innerHTML = '<div style="padding:40px; color:var(--red)">Error de conexión con la base de datos.</div>';
    }
  }

  // ── FORMULARIOS Y SELECTS RELACIONALES ─────────
  async function openModal(mod, index = -1, isViewOnly = false) {
    const sch = SCHEMA[mod];
    State.editingIndex = index;
    const row = index >= 0 ? State.rows[index] : {};
    
    // Cargar listas para Foreign Keys (FK) dinámicamente
    const fkFields = sch.fields.filter(f => f.type === 'fk');
    for (let f of fkFields) {
      if (!State.fkCache[f.ref]) {
        try { State.fkCache[f.ref] = await api(f.ref); } 
        catch(e) { State.fkCache[f.ref] = []; }
      }
    }

    let html = `
      <div class="modal">
        <div class="modal-header">
          <h3 style="font-size:18px; font-weight:700">${isViewOnly ? '👁 Detalles' : (index >= 0 ? '✏ Editar' : '➕ Nuevo')} ${sch.label}</h3>
          <span class="modal-close" onclick="closeModal()">×</span>
        </div>
        <div class="modal-body">
          <div class="form-grid">
            ${sch.fields.filter(f=>!f.pk).map(f => {
              let inputHtml = '';
              const val = row[f.key] || '';
              const disabled = isViewOnly ? 'disabled' : '';
              
              if (f.type === 'select') {
                inputHtml = `<select id="f-${f.key}" class="form-input" ${disabled}>
                  <option value="">Seleccionar...</option>
                  ${f.options.map(o => `<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('')}
                </select>`;
              } else if (f.type === 'fk') {
                const options = State.fkCache[f.ref] || [];
                inputHtml = `<select id="f-${f.key}" class="form-input" ${disabled}>
                  <option value="">Seleccionar ${f.label}...</option>
                  ${options.map(o => `<option value="${o.id}" ${val===o.id?'selected':''}>${o.codigo ? o.codigo+' - ' : ''}${o[f.refLabel]}</option>`).join('')}
                </select>`;
              } else {
                inputHtml = `<input type="${f.type||'text'}" id="f-${f.key}" class="form-input" value="${val}" ${disabled} placeholder="${f.label}">`;
              }
              return `<div class="form-field"><label class="form-label">${f.label}</label>${inputHtml}</div>`;
            }).join('')}
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
          ${!isViewOnly ? `<button class="btn btn-primary" onclick="saveItem('${mod}')">Guardar Registro</button>` : ''}
        </div>
      </div>`;
    
    const overlay = document.getElementById('modal-overlay');
    overlay.innerHTML = html;
    overlay.style.display = 'flex';
  }

  function viewModal(mod, index) { openModal(mod, index, true); }
  function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

  // ── ACCIONES DE BASE DE DATOS ──────────────────
  async function saveItem(mod) {
    const sch = SCHEMA[mod];
    const data = {};
    sch.fields.filter(f=>!f.pk).forEach(f => {
      const el = document.getElementById('f-' + f.key);
      if (el && el.value) data[f.key] = el.value;
    });

    try {
      const isEdit = State.editingIndex >= 0;
      const url = isEdit ? `${CONFIG.url}${mod}?id=eq.${State.rows[State.editingIndex].id}` : `${CONFIG.url}${mod}`;
      const res = await fetch(url, {
        method: isEdit ? 'PATCH' : 'POST',
        headers: { 'apikey': CONFIG.key, 'Authorization': `Bearer ${CONFIG.key}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (res.ok) { closeModal(); navigate(mod); } 
      else { alert("Error al guardar en base de datos."); }
    } catch(e) { alert("Error de red."); }
  }

  async function deleteItem(mod, index) {
    if (!confirm("⚠️ ¿Eliminar permanentemente este registro? Esta acción no se puede deshacer.")) return;
    try {
      const url = `${CONFIG.url}${mod}?id=eq.${State.rows[index].id}`;
      await fetch(url, { method: 'DELETE', headers: { 'apikey': CONFIG.key, 'Authorization': `Bearer ${CONFIG.key}` } });
      navigate(mod);
    } catch(e) { alert("Error al eliminar"); }
  }

  // ── FLUJO DE ÓRDENES DE TRABAJO (PLAY / STOP) ──
  async function actionOT(index, action) {
    const ot = State.rows[index];
    const now = new Date().toISOString().slice(0, 16); // Formato datetime-local YYYY-MM-DDTHH:mm
    let updateData = {};

    if (action === 'start') {
      if (!confirm("¿Iniciar orden ahora? Se registrará la fecha y hora actual.")) return;
      updateData = { estado: 'En proceso', fecha_inicio_real: now };
    } else if (action === 'stop') {
      if (!confirm("¿Finalizar orden? Esto la marcará como Completada.")) return;
      updateData = { estado: 'Completada', fecha_fin_real: now };
    }

    try {
      const url = `${CONFIG.url}ordenes_trabajo?id=eq.${ot.id}`;
      await fetch(url, {
        method: 'PATCH',
        headers: { 'apikey': CONFIG.key, 'Authorization': `Bearer ${CONFIG.key}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(updateData)
      });
      navigate('ordenes_trabajo'); // Recargar tabla
    } catch(e) { alert("Error actualizando la OT."); }
  }
</script>
