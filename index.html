<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMMS Enterprise — Full System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  /* ── CSS FULL SYSTEM ────────────────────────────────── */
  :root {
    --bg: #1c2228; --surface: #262c33; --surface2: #343d46;
    --primary: #0070f2; --text: #f0f2f5; --text-dim: #a0aab4;
    --border: #3d444b; --red: #ff4d4d; --green: #107e3e; --yellow: #e9730c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
  
  /* SHELL */
  .shell-bar { height: 48px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top: 0; width: 100%; z-index: 1000; }
  .logo { font-weight: 700; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 18px; }
  .logo span { color: var(--primary); }
  .shell-right { display: flex; align-items: center; gap: 15px; }
  
  /* LAYOUT */
  .app-layout { display: flex; padding-top: 48px; height: 100vh; }
  .side-nav { width: 250px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 20px 10px; flex-shrink: 0; }
  .main-content { flex-grow: 1; overflow-y: auto; padding: 25px; position: relative; background: var(--bg); }

  /* NAV */
  .nav-group-hdr { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin: 22px 0 8px 12px; letter-spacing: 1px; font-weight: 600; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; color: var(--text-dim); text-decoration: none; border-radius: 6px; font-size: 13px; cursor: pointer; margin-bottom: 2px; transition: .2s; }
  .nav-item:hover { background: var(--surface2); color: #fff; }
  .nav-item.active { background: var(--primary); color: #fff; font-weight: 600; box-shadow: 0 4px 10px rgba(0,112,242,0.3); }

  /* GRID */
  .grid-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-top: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--surface2); padding: 14px 12px; text-align: left; color: var(--text-dim); border-bottom: 1px solid var(--border); font-weight: 600; }
  td { padding: 12px; border-bottom: 1px solid var(--border); color: var(--text); }
  tr:hover { background: rgba(255,255,255,0.03); }

  /* UI COMPONENTS */
  .btn { padding: 8px 16px; border-radius: 4px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; transition: .2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-icon { padding: 6px; border-radius: 4px; }
  
  .badge { padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-green { background: rgba(16,126,62,0.15); color: #48bb78; border: 1px solid rgba(16,126,62,0.3); }
  .badge-blue { background: rgba(0,112,242,0.15); color: #4dabff; border: 1px solid rgba(0,112,242,0.3); }
  .badge-yellow { background: rgba(233,115,12,0.15); color: #f6ad55; border: 1px solid rgba(233,115,12,0.3); }
  .badge-red { background: rgba(255,77,77,0.15); color: #ff6b6b; border: 1px solid rgba(255,77,77,0.3); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(4px); }
  .modal { background: var(--surface); width: 100%; max-width: 600px; border-radius: 10px; border: 1px solid var(--border); padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); position: relative; }
  .modal-close { position: absolute; top: 15px; right: 15px; color: var(--text-dim); cursor: pointer; font-size: 20px; }
  .form-field { margin-bottom: 20px; }
  .form-label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }
  .form-input { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); color: #fff; border-radius: 6px; font-size: 14px; }
  
  .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.05); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 60px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* GANTT */
  .gantt-chart { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; height: 500px; margin-top: 20px; }
  .gantt-sidebar { width: 200px; border-right: 1px solid var(--border); flex-shrink: 0; background: var(--surface2); }
  .gantt-body { flex-grow: 1; overflow-x: auto; position: relative; }
  .gantt-timeline { display: flex; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .gantt-day { min-width: 60px; padding: 10px; text-align: center; border-right: 1px solid var(--border); font-size: 11px; color: var(--text-dim); }
  .gantt-row { height: 45px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); position: relative; }
  .gantt-bar { position: absolute; height: 28px; border-radius: 4px; display: flex; align-items: center; padding: 0 10px; font-size: 10px; font-weight: 700; color: #fff; cursor: pointer; transition: .2s; white-space: nowrap; overflow: hidden; }
</style>
</head>
<body>

<div id="root"></div>

<script>
  // ── CONFIGURACIÓN & SCHEMA ─────────────────────
  const CONFIG = {
    url: 'https://xwciwrtenrdvhwvvjkzt.supabase.co/rest/v1/',
    key: 'sb_publishable_RIfaIPuzvQ27Drwp-vx-MQ_o6_xgoGt'
  };

  const SCHEMA = {
    dashboard: { label: "Dashboard", group: "Principal", icon: "📊" },
    empresas: { label: "Empresas", group: "Jerarquía", icon: "🏢", fields: [
      {key: "id", label: "ID", pk: true, hidden: true},
      {key: "codigo", label: "Código", required: true},
      {key: "nombre", label: "Nombre", required: true},
      {key: "pais", label: "País"},
      {key: "estado", label: "Estado", type: "select", options: ["Activa","Inactiva"]}
    ]},
    sitios: { label: "Plantas / Sitios", group: "Jerarquía", icon: "🏗", fields: [
      {key: "id", pk: true, hidden: true},
      {key: "codigo", label: "Código"},
      {key: "nombre", label: "Nombre"},
      {key: "ciudad", label: "Ciudad"},
      {key: "estado", label: "Estado", type: "select", options: ["Activo","Inactivo"]}
    ]},
    ubicaciones: { label: "Ubicaciones", group: "Jerarquía", icon: "📍", fields: [
      {key: "id", pk: true, hidden: true},
      {key: "nombre", label: "Nombre Ubicación"},
      {key: "descripcion", label: "Descripción"},
      {key: "sitio_id", label: "ID Sitio (Relación)"}
    ]},
    procesos: { label: "Procesos", group: "Jerarquía", icon: "⚙", fields: [
      {key: "id", pk: true, hidden: true},
      {key: "codigo", label: "Código"},
      {key: "nombre", label: "Nombre"},
      {key: "tipo_proceso", label: "Tipo"},
      {key: "estado", label: "Estado"}
    ]},
    activos_principales: { label: "Activos", group: "Jerarquía", icon: "🏭", fields: [
      {key: "id", pk: true, hidden: true},
      {key: "codigo", label: "Tag Activo"},
      {key: "nombre", label: "Nombre"},
      {key: "marca", label: "Marca"},
      {key: "modelo", label: "Modelo"},
      {key: "estado", label: "Estado", type: "select", options: ["Operativo","Fuera de servicio","En mantenimiento"]}
    ]},
    mps: { label: "Planes MP", group: "Mantenimiento", icon: "📅", fields: [
      {key: "id", pk: true, hidden: true},
      {key: "codigo_mp", label: "Cod MP"},
      {key: "nombre_mp", label: "Nombre Plan"},
      {key: "frecuencia", label: "Frecuencia"},
      {key: "estado", label: "Estado"}
    ]},
    ordenes_trabajo: { label: "Órdenes de Trabajo", group: "Mantenimiento", icon: "📋", fields: [
      {key: "id", pk: true, hidden: true},
      {key: "numero_ot", label: "Nº OT"},
      {key: "tipo_ot", label: "Tipo"},
      {key: "prioridad", label: "Prioridad", type: "select", options: ["Baja","Media","Alta","Crítica"]},
      {key: "estado", label: "Estado", type: "select", options: ["Aprobada","En proceso","Completada","Cerrada"]},
      {key: "fecha_inicio_programada", label: "Inicio Prog.", type: "date"}
    ]},
    inventarios: { label: "Stock / Almacén", group: "Logística", icon: "📦", fields: [
      {key: "id", pk: true, hidden: true},
      {key: "nombre_item", label: "Artículo"},
      {key: "stock_actual", label: "Stock"},
      {key: "costo_unitario", label: "Costo"},
      {key: "almacen", label: "Almacén"}
    ]},
    personal: { label: "Personal Técnico", group: "Recursos", icon: "👤", fields: [
      {key: "id", pk: true, hidden: true},
      {key: "nombre", label: "Nombre"},
      {key: "apellido", label: "Apellido"},
      {key: "especialidad", label: "Especialidad"},
      {key: "estado", label: "Estado"}
    ]},
    usuarios: { label: "Seguridad y Usuarios", group: "Sistema", icon: "🔑", fields: [
      {key: "id", pk: true, hidden: true},
      {key: "username", label: "Usuario"},
      {key: "nombre_completo", label: "Nombre Real"},
      {key: "role", label: "Rol", type: "select", options: ["Admin","Supervisor","Técnico"]}
    ]}
  };

  const State = {
    user: JSON.parse(localStorage.getItem('cmms_user')) || null,
    currentModule: 'dashboard',
    rows: [],
    editingIndex: -1,
    permissions: { canDelete: false, allowedViews: ['*'] }
  };

  // ── MOTOR API ─────────────────────────────────
  async function api(path, method = 'GET', body = null) {
    const url = `${CONFIG.url}${path.toLowerCase()}?select=*`;
    const headers = { 'apikey': CONFIG.key, 'Authorization': `Bearer ${CONFIG.key}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
    const opts = { method, headers };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    if (!res.ok) throw new Error("Error en conexión con Supabase");
    return res.json();
  }

  // ── NAVEGACIÓN Y BOOT ─────────────────────────
  window.onload = () => {
    if (!State.user) return renderLogin();
    applyPermissions();
    renderShell();
    navigate('dashboard');
  };

  function applyPermissions() {
    const r = State.user.role;
    if (r === 'Admin') State.permissions = { canDelete: true, allowedViews: ['*'] };
    else State.permissions = { canDelete: false, allowedViews: ['dashboard','ordenes_trabajo','mps','activos_principales'] };
  }

  function login() {
    const u = document.getElementById('login-user').value.toLowerCase();
    if (u === 'admin') State.user = { nombre: 'Super Admin', role: 'Admin' };
    else if (u === 'tecnico') State.user = { nombre: 'Técnico Campo', role: 'Técnico' };
    else return alert('Usuario: admin o tecnico');
    localStorage.setItem('cmms_user', JSON.stringify(State.user));
    location.reload();
  }

  function logout() { localStorage.removeItem('cmms_user'); location.reload(); }

  function navigate(mod) {
    State.currentModule = mod;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.id === 'nav-'+mod));
    if (mod === 'dashboard') renderDashboard();
    else if (mod === 'gantt') renderGantt();
    else renderModule(mod);
  }

  // ── RENDERIZADO DE VISTAS ──────────────────────
  function renderLogin() {
    document.getElementById('root').innerHTML = `
      <div style="height:100vh; display:flex; align-items:center; justify-content:center; background:#1c2228">
        <div class="modal" style="display:block; width:350px; text-align:center">
          <h2 style="letter-spacing:2px; margin-bottom:10px">CMMS ENTERPRISE</h2>
          <p style="color:var(--text-dim); font-size:11px; margin-bottom:30px">PORTAL DE ACCESO SEGURO</p>
          <input type="text" id="login-user" class="form-input" style="margin-bottom:15px" placeholder="admin / tecnico" onkeypress="if(event.key==='Enter')login()">
          <button class="btn btn-primary" style="width:100%" onclick="login()">INICIAR SESIÓN</button>
        </div>
      </div>`;
  }

  function renderShell() {
    document.getElementById('root').innerHTML = `
      <header class="shell-bar">
        <div class="logo" onclick="navigate('dashboard')"><span>CCMS</span> SBNE</div>
        <div class="shell-right">
          <div style="font-size:11px; color:var(--green)">● CONECTADO</div>
          <button class="btn btn-ghost" onclick="logout()">SALIR</button>
        </div>
      </header>
      <div class="app-layout">
        <nav class="side-nav">
          <div class="nav-item" id="nav-dashboard" onclick="navigate('dashboard')">📊 Dashboard</div>
          <div class="nav-group-hdr">MANTENIMIENTO</div>
          <div class="nav-item" id="nav-ordenes_trabajo" onclick="navigate('ordenes_trabajo')">📋 Órdenes de Trabajo</div>
          <div class="nav-item" id="nav-mps" onclick="navigate('mps')">📅 Planes de MP</div>
          <div class="nav-group-hdr">JERARQUÍA</div>
          <div class="nav-item" id="nav-activos_principales" onclick="navigate('activos_principales')">🏭 Activos</div>
          <div class="nav-item" id="nav-ubicaciones" onclick="navigate('ubicaciones')">📍 Ubicaciones</div>
          <div class="nav-item" id="nav-procesos" onclick="navigate('procesos')">⚙ Procesos</div>
          <div class="nav-item" id="nav-sitios" onclick="navigate('sitios')">🏗 Sitios / Plantas</div>
          <div class="nav-item" id="nav-empresas" onclick="navigate('empresas')">🏢 Empresas</div>
          <div class="nav-group-hdr">SISTEMA</div>
          <div class="nav-item" id="nav-personal" onclick="navigate('personal')">👤 Personal</div>
          <div class="nav-item" id="nav-usuarios" onclick="navigate('usuarios')">🔑 Usuarios</div>
        </nav>
        <main class="main-content" id="main-content"></main>
      </div>
      <div class="modal-overlay" id="modal-overlay"></div>`;
  }

  async function renderDashboard() {
    document.getElementById('main-content').innerHTML = `<h1>Dashboard</h1><div class="spinner"></div>`;
    try {
      const ots = await api('ordenes_trabajo');
      document.getElementById('main-content').innerHTML = `
        <h1>Dashboard Operacional</h1>
        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-label">OT Pendientes</div>
            <div class="kpi-val">${ots.filter(o=>o.estado==='Aprobada').length}</div>
          </div>
          <div class="kpi-card" style="border-left-color:var(--yellow)">
            <div class="kpi-label">En Proceso</div>
            <div class="kpi-val">${ots.filter(o=>o.estado==='En proceso').length}</div>
          </div>
          <div class="kpi-card" style="border-left-color:var(--green)">
            <div class="kpi-label">Completadas Mes</div>
            <div class="kpi-val">${ots.filter(o=>o.estado==='Completada').length}</div>
          </div>
        </div>`;
    } catch(e) { document.getElementById('main-content').innerHTML = "<h1>Dashboard</h1><p>Error de conexión</p>"; }
  }

  async function renderModule(mod) {
    const sch = SCHEMA[mod];
    document.getElementById('main-content').innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center">
        <h1>${sch.icon} ${sch.label}</h1>
        <button class="btn btn-primary" onclick="openModal('${mod}')">+ Nuevo</button>
      </div>
      <div class="grid-wrap" id="grid-container"><div class="spinner"></div></div>`;
    
    try {
      State.rows = await api(mod);
      let html = `<table><thead><tr><th>#</th>${sch.fields.filter(f=>!f.hidden).map(f => `<th>${f.label}</th>`).join('')}<th>ACCIONES</th></tr></thead><tbody>`;
      State.rows.forEach((r, i) => {
        html += `<tr><td>${i+1}</td>${sch.fields.filter(f=>!f.hidden).map(f => {
          const val = r[f.key] || '—';
          if (val === 'Aprobada' || val === 'Activo' || val === 'Operativo') return `<td><span class="badge badge-green">${val}</span></td>`;
          if (val === 'En proceso') return `<td><span class="badge badge-blue">${val}</span></td>`;
          if (val === 'Crítica' || val === 'Fuera de servicio') return `<td><span class="badge badge-red">${val}</span></td>`;
          return `<td>${val}</td>`;
        }).join('')}
        <td>
          <button class="btn btn-ghost btn-icon" onclick="openModal('${mod}', ${i})">✏</button>
          ${State.permissions.canDelete ? `<button class="btn btn-danger btn-icon" onclick="deleteItem('${mod}', ${i})">🗑</button>` : ''}
        </td></tr>`;
      });
      html += '</tbody></table>';
      document.getElementById('grid-container').innerHTML = State.rows.length ? html : '<div style="padding:40px; text-align:center">Sin datos</div>';
    } catch (e) {
      document.getElementById('grid-container').innerHTML = '<p>Error cargando módulo</p>';
    }
  }

  // ── LÓGICA DE FORMULARIOS ───────────────────────
  function openModal(mod, index = -1) {
    const sch = SCHEMA[mod];
    State.editingIndex = index;
    const row = index >= 0 ? State.rows[index] : {};
    
    let html = `
      <div class="modal">
        <span class="modal-close" onclick="closeModal()">×</span>
        <h3>${index >= 0 ? 'Editar' : 'Nuevo'} ${sch.label}</h3>
        <div style="margin-top:20px">
          ${sch.fields.filter(f=>!f.pk).map(f => `
            <div class="form-field">
              <label class="form-label">${f.label}</label>
              ${f.type === 'select' ? `
                <select id="f-${f.key}" class="form-input">
                  ${f.options.map(o => `<option value="${o}" ${row[f.key]===o?'selected':''}>${o}</option>`).join('')}
                </select>
              ` : `
                <input type="${f.type||'text'}" id="f-${f.key}" class="form-input" value="${row[f.key]||''}">
              `}
            </div>
          `).join('')}
        </div>
        <div style="text-align:right; margin-top:20px">
          <button class="btn btn-ghost" onclick="closeModal()" style="margin-right:10px">Cancelar</button>
          <button class="btn btn-primary" onclick="saveItem('${mod}')">Guardar</button>
        </div>
      </div>`;
    
    const overlay = document.getElementById('modal-overlay');
    overlay.innerHTML = html;
    overlay.style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

  async function saveItem(mod) {
    const sch = SCHEMA[mod];
    const data = {};
    sch.fields.filter(f=>!f.pk).forEach(f => {
      data[f.key] = document.getElementById('f-' + f.key).value;
    });

    try {
      const isEdit = State.editingIndex >= 0;
      const url = isEdit ? `${CONFIG.url}${mod}?id=eq.${State.rows[State.editingIndex].id}` : `${CONFIG.url}${mod}`;
      const method = isEdit ? 'PATCH' : 'POST';
      
      const res = await fetch(url, {
        method,
        headers: { 'apikey': CONFIG.key, 'Authorization': `Bearer ${CONFIG.key}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
        body: JSON.stringify(data)
      });

      if (res.ok) {
        closeModal();
        navigate(mod);
      } else { alert("Error al guardar"); }
    } catch(e) { alert("Error fatal"); }
  }

  async function deleteItem(mod, index) {
    if (!confirm("¿Seguro que deseas eliminar este registro?")) return;
    try {
      const url = `${CONFIG.url}${mod}?id=eq.${State.rows[index].id}`;
      const res = await fetch(url, {
        method: 'DELETE',
        headers: { 'apikey': CONFIG.key, 'Authorization': `Bearer ${CONFIG.key}` }
      });
      if (res.ok) navigate(mod);
    } catch(e) { alert("Error al eliminar"); }
  }

  window.onload = init;
</script>
</body>
</html>
